<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
      background-color: #F2F0EB;
      background-image: radial-gradient(circle, rgba(0,0,0,0.18) 1.5px, transparent 1.5px);
      background-size: 34px 34px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 52px 0;
    }

    .step-label {
      font-size: 20px;
      color: #999;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .slide-counter {
      font-size: 20px;
      color: #bbb;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 52px 32px;
      position: relative;
    }

    .step-number {
      font-size: 200px;
      font-weight: 900;
      color: rgba(0,0,0,0.06);
      line-height: 1;
      letter-spacing: -0.05em;
      position: absolute;
      top: 0;
      right: 40px;
      pointer-events: none;
      user-select: none;
    }

    h2 {
      font-size: 72px;
      font-weight: 900;
      color: #0A0A0A;
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    h2 .accent { color: #D97757; }

    .body-text {
      font-size: 26px;
      color: #444;
      font-weight: 400;
      line-height: 1.55;
      margin-bottom: 36px;
      max-width: 860px;
      position: relative;
      z-index: 1;
    }

    .tip-box {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: #0A0A0A;
      color: #fff;
      border-radius: 16px;
      padding: 22px 28px;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.5;
      position: relative;
      z-index: 1;
      max-width: 860px;
    }

    .tip-box strong { color: #D97757; font-weight: 700; }

    .tip-icon {
      font-size: 22px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .bottom-bar {
      border-top: 1.5px solid rgba(0,0,0,0.1);
      padding: 26px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.45);
    }

    .author {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      background: #0A0A0A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: #D97757;
      flex-shrink: 0;
    }

    .author-text .handle {
      font-size: 18px;
      font-weight: 700;
      color: #0A0A0A;
    }

    .author-text .tagline {
      font-size: 14px;
      color: #999;
      margin-top: 2px;
    }

    .save-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 800;
      color: #0A0A0A;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .save-icon { width: 22px; height: 28px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="step-label">{{STEP_LABEL}}</span>
    <span class="slide-counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</span>
  </div>

  <div class="content">
    <div class="step-number">{{STEP_NUM}}</div>
    <h2>{{TITLE}}</h2>
    <p class="body-text">{{BODY}}</p>
    <div class="tip-box">
      <span class="tip-icon">💡</span>
      <span>{{TIP}}</span>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="author">
      <div class="avatar">✳</div>
      <div class="author-text">
        <div class="handle">@claudeprofessor</div>
        <div class="tagline">Tips diarios de Claude AI</div>
      </div>
    </div>
    <div class="save-badge">
      <svg class="save-icon" viewBox="0 0 22 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0h22v28l-11-7-11 7V0z" fill="#0A0A0A"/>
      </svg>
      SAVE for LATER
    </div>
  </div>

</body>
</html>
