<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
      background-color: #F2F0EB;
      background-image: radial-gradient(circle, rgba(0,0,0,0.18) 1.5px, transparent 1.5px);
      background-size: 34px 34px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 52px 0;
    }

    .top-label {
      font-size: 20px;
      color: #999;
      font-weight: 500;
    }

    .top-handle {
      font-size: 20px;
      color: #999;
      font-weight: 500;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 52px;
    }

    .cta-eyebrow {
      font-size: 20px;
      font-weight: 700;
      color: #D97757;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 88px;
      font-weight: 900;
      color: #0A0A0A;
      line-height: 0.96;
      letter-spacing: -0.04em;
      margin-bottom: 36px;
      max-width: 900px;
    }

    .cta-subtitle {
      font-size: 26px;
      color: #666;
      font-weight: 400;
      line-height: 1.5;
      max-width: 740px;
      margin-bottom: 52px;
    }

    .follow-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .follow-btn {
      background: #0A0A0A;
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      padding: 18px 44px;
      border-radius: 100px;
      letter-spacing: 0.04em;
    }

    .arrow-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #D97757;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 32px;
      border-radius: 100px;
    }

    .bottom-bar {
      border-top: 1.5px solid rgba(0,0,0,0.1);
      padding: 26px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.45);
    }

    .author {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      background: #0A0A0A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: #D97757;
      flex-shrink: 0;
    }

    .author-text .handle {
      font-size: 18px;
      font-weight: 700;
      color: #0A0A0A;
    }

    .author-text .tagline {
      font-size: 14px;
      color: #999;
      margin-top: 2px;
    }

    .save-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 800;
      color: #0A0A0A;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .save-icon { width: 22px; height: 28px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="top-label">Claude AI</span>
    <span class="top-handle">claudeprofessor.com</span>
  </div>

  <div class="content">
    <div class="cta-eyebrow">Cada día un nuevo truco</div>
    <h1>{{CTA_TITLE}}</h1>
    <p class="cta-subtitle">{{CTA_SUBTITLE}}</p>
    <div class="follow-row">
      <div class="follow-btn">Seguir @claudeprofessor</div>
      <div class="arrow-pill">✳ Tips diarios →</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="author">
      <div class="avatar">✳</div>
      <div class="author-text">
        <div class="handle">@claudeprofessor</div>
        <div class="tagline">Tips diarios de Claude AI</div>
      </div>
    </div>
    <div class="save-badge">
      <svg class="save-icon" viewBox="0 0 22 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0h22v28l-11-7-11 7V0z" fill="#0A0A0A"/>
      </svg>
      SAVE for LATER
    </div>
  </div>

</body>
</html>
