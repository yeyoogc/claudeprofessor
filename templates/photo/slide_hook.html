<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      overflow: hidden;
      position: relative;
    }

    /* Full-bleed photo */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('{{BG_IMAGE_URL}}');
      background-size: cover;
      background-position: center 20%;
      filter: brightness(0.82) saturate(1.15) contrast(1.05);
    }

    /* Heavy gradient — keeps top visible, blacks out bottom */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.08) 0%,
        rgba(0,0,0,0.0)  25%,
        rgba(0,0,0,0.35) 50%,
        rgba(0,0,0,0.82) 72%,
        rgba(0,0,0,0.97) 100%
      );
    }

    /* Top row — tiny brand attribution */
    .top {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 40px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .handle {
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.06em;
      text-transform: lowercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .handle-dot {
      width: 6px; height: 6px;
      background: #D97757;
      border-radius: 50%;
    }

    .category-tag {
      font-size: 13px;
      font-weight: 800;
      color: #D97757;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Main text — anchored bottom */
    .text {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 52px 56px;
    }

    h1 {
      font-size: 116px;
      font-weight: 900;
      color: #fff;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: 28px;
      max-width: 960px;
    }

    h1 .accent {
      color: #D97757;
      font-style: italic;
    }

    .sub {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      max-width: 700px;
      margin-bottom: 40px;
    }

    /* Bottom bar */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .author {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .author-name {
      font-size: 17px;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
    }

    .author-sep {
      font-size: 17px;
      color: rgba(255,255,255,0.25);
      margin: 0 12px;
    }

    .author-tag {
      font-size: 15px;
      color: rgba(255,255,255,0.35);
    }

    .swipe-hint {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .swipe-arrow {
      width: 36px; height: 36px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .swipe-arrow svg {
      width: 14px; height: 14px;
      fill: none;
      stroke: rgba(255,255,255,0.5);
      stroke-width: 2;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="top">
    <div class="handle">
      <div class="handle-dot"></div>
      claudeprofessor
    </div>
    <div class="category-tag">{{TAG}}</div>
  </div>

  <div class="text">
    <h1>{{TITLE}}</h1>
    <p class="sub">{{SUBTITLE}}</p>
    <div class="bottom">
      <div class="author">
        <span class="author-name">@claudeprofessor</span>
        <span class="author-sep">·</span>
        <span class="author-tag">Claude AI en español</span>
      </div>
      <div class="swipe-hint">
        Desliza
        <div class="swipe-arrow">
          <svg viewBox="0 0 14 14"><polyline points="5,2 11,7 5,12"/></svg>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
