<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,900;1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      overflow: hidden;
      position: relative;
    }

    /* Photo — full bleed, darker than hook */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('{{BG_IMAGE_URL}}');
      background-size: cover;
      background-position: center;
      filter: brightness(0.3) saturate(0.8);
    }

    /* Vignette + bottom blackout */
    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.75) 60%, rgba(0,0,0,0.98) 100%);
    }

    /* Step number — huge ghost */
    .step-ghost {
      position: absolute;
      top: -40px;
      right: 20px;
      font-size: 500px;
      font-weight: 900;
      color: rgba(217,119,87,0.07);
      line-height: 1;
      letter-spacing: -0.06em;
      user-select: none;
      z-index: 1;
    }

    /* Top */
    .top {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 44px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .step-label {
      font-size: 13px;
      font-weight: 900;
      color: #D97757;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .step-label::before {
      content: '';
      width: 32px; height: 2px;
      background: #D97757;
    }

    .counter {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }

    /* Content — lower 2/3 of slide */
    .content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 52px 56px;
    }

    h2 {
      font-size: 92px;
      font-weight: 900;
      color: #fff;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: 28px;
      max-width: 940px;
    }

    h2 .accent { color: #D97757; }

    .body {
      font-size: 26px;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      line-height: 1.55;
      max-width: 820px;
      margin-bottom: 40px;
    }

    .body strong { color: rgba(255,255,255,0.85); font-weight: 700; }

    /* Key insight strip */
    .insight {
      border-left: 4px solid #D97757;
      padding: 0 0 0 24px;
      margin-bottom: 40px;
    }

    .insight-text {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
      font-style: italic;
    }

    /* Bottom */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .handle {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
    }

    .dot.active {
      width: 28px;
      border-radius: 4px;
      background: #D97757;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="step-ghost">{{STEP_NUM}}</div>

  <div class="top">
    <div class="step-label">{{STEP_LABEL}}</div>
    <div class="counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="content">
    <h2>{{TITLE}}</h2>
    <p class="body">{{BODY}}</p>
    <div class="insight">
      <div class="insight-text">{{TIP}}</div>
    </div>
    <div class="bottom">
      <div class="handle">@claudeprofessor</div>
      <div class="dots">{{DOTS}}</div>
    </div>
  </div>

</body>
</html>
