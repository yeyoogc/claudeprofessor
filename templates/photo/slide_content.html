<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
      background: #0D0D0D;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Faint photo strip at top for continuity */
    .bg-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 320px;
      background-image: url('{{BG_IMAGE_URL}}');
      background-size: cover;
      background-position: center top;
      opacity: 0.35;
    }

    .strip-fade {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 380px;
      background: linear-gradient(to bottom, rgba(13,13,13,0.3) 0%, #0D0D0D 100%);
    }

    /* Big step number floating in photo area */
    .step-big {
      position: absolute;
      top: 30px;
      right: 52px;
      font-size: 280px;
      font-weight: 900;
      color: rgba(217,119,87,0.15);
      line-height: 1;
      letter-spacing: -0.06em;
      z-index: 2;
      pointer-events: none;
    }

    .top-bar {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 44px 52px 0;
    }

    .step-label {
      font-size: 13px;
      font-weight: 900;
      color: #D97757;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step-label::before {
      content: '';
      width: 28px;
      height: 2px;
      background: #D97757;
    }

    .slide-counter {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
    }

    .content {
      flex: 1;
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 52px 32px;
      gap: 22px;
    }

    h2 {
      font-size: 76px;
      font-weight: 900;
      color: #fff;
      line-height: 0.94;
      letter-spacing: -0.035em;
      text-transform: uppercase;
      max-width: 900px;
    }

    h2 .accent { color: #D97757; }

    .body-text {
      font-size: 25px;
      color: rgba(255,255,255,0.65);
      font-weight: 400;
      line-height: 1.55;
      max-width: 820px;
    }

    .tip-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(217,119,87,0.25);
      border-left: 5px solid #D97757;
      border-radius: 0 12px 12px 0;
      padding: 18px 24px;
      max-width: 860px;
    }

    .tip-label {
      font-size: 11px;
      font-weight: 900;
      color: #D97757;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .tip-text {
      font-size: 20px;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
      line-height: 1.5;
    }

    .tip-text strong { color: #D97757; font-weight: 800; }

    .bottom-bar {
      position: relative;
      z-index: 3;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 22px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .handle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
    }

    .handle svg { fill: #D97757; width: 13px; height: 13px; }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }

    .dot.active {
      width: 28px;
      border-radius: 5px;
      background: #D97757;
    }
  </style>
</head>
<body>

  <div class="bg-strip"></div>
  <div class="strip-fade"></div>
  <div class="step-big">{{STEP_NUM}}</div>

  <div class="top-bar">
    <div class="step-label">{{STEP_LABEL}}</div>
    <div class="slide-counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="content">
    <h2>{{TITLE}}</h2>
    <p class="body-text">{{BODY}}</p>
    <div class="tip-box">
      <div class="tip-label">💡 PRO TIP</div>
      <div class="tip-text">{{TIP}}</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="handle">
      <svg viewBox="0 0 100 100">
        <rect x="44" y="5" width="12" height="90" rx="6"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(45 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(90 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(135 50 50)"/>
      </svg>
      claudeprofessor
    </div>
    <div class="dots">{{DOTS}}</div>
  </div>

</body>
</html>
