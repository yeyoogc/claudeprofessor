<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
      background: #111;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .bg-photo {
      position: absolute;
      inset: 0;
      background-image: url('{{BG_IMAGE_URL}}');
      background-size: cover;
      background-position: center;
      filter: saturate(0.7) brightness(0.45);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 60% 40%, rgba(217,119,87,0.18) 0%, transparent 55%),
        linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.75) 60%, rgba(0,0,0,0.97) 100%);
    }

    .top-bar {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 44px 52px 0;
    }

    .brand-pill {
      display: flex;
      align-items: center;
      gap: 9px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      padding: 9px 18px;
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.05em;
    }

    .brand-pill svg { fill: #D97757; }

    .counter {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
    }

    .content {
      flex: 1;
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 52px 40px;
    }

    .eyebrow {
      font-size: 15px;
      font-weight: 900;
      color: #D97757;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .eyebrow::before {
      content: '';
      width: 36px;
      height: 2px;
      background: #D97757;
    }

    h1 {
      font-size: 96px;
      font-weight: 900;
      color: #fff;
      line-height: 0.90;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-bottom: 28px;
      max-width: 960px;
    }

    .cta-subtitle {
      font-size: 24px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      line-height: 1.5;
      max-width: 700px;
      margin-bottom: 44px;
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .btn-follow {
      background: #fff;
      color: #0D0D0D;
      font-size: 18px;
      font-weight: 900;
      padding: 18px 44px;
      border-radius: 100px;
      letter-spacing: 0.04em;
    }

    .btn-tips {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #D97757;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 32px;
      border-radius: 100px;
    }

    .bottom-bar {
      position: relative;
      z-index: 3;
      border-top: 1px solid rgba(255,255,255,0.12);
      padding: 22px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .foot-label {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }

    .dot.active {
      width: 28px;
      border-radius: 5px;
      background: #D97757;
    }
  </style>
</head>
<body>

  <div class="bg-photo"></div>
  <div class="overlay"></div>

  <div class="top-bar">
    <div class="brand-pill">
      <svg width="16" height="16" viewBox="0 0 100 100">
        <rect x="44" y="5" width="12" height="90" rx="6"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(45 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(90 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(135 50 50)"/>
      </svg>
      claudeprofessor
    </div>
    <div class="counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="content">
    <div class="eyebrow">cada día un nuevo truco</div>
    <h1>{{CTA_TITLE}}</h1>
    <p class="cta-subtitle">{{CTA_SUBTITLE}}</p>
    <div class="btn-row">
      <div class="btn-follow">Seguir @claudeprofessor</div>
      <div class="btn-tips">✳ Tips diarios →</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="foot-label">claudeprofessor.com</div>
    <div class="dots">{{DOTS}}</div>
  </div>

</body>
</html>
