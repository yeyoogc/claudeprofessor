<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #1A1816;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(217,119,87,0.06) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  /* Gradient glow */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(217,119,87,0.12) 0%, transparent 70%);
    top: -150px;
    right: -150px;
  }

  .glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(217,119,87,0.08) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
  }

  /* Top bar */
  .topbar {
    position: absolute;
    top: 56px;
    left: 60px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-name {
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.50);
    letter-spacing: 0.02em;
  }

  .slide-pill {
    background: rgba(217,119,87,0.20);
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 16px;
    font-weight: 600;
    color: #D97757;
    letter-spacing: 0.04em;
  }

  /* Step number */
  .step-number {
    position: absolute;
    top: 140px;
    left: 60px;
    font-size: 220px;
    font-weight: 900;
    color: rgba(217,119,87,0.07);
    line-height: 1;
    letter-spacing: -0.05em;
  }

  /* Main card */
  .card {
    background: rgba(255,248,243,0.04);
    border: 1.5px solid rgba(217,119,87,0.15);
    border-radius: 28px;
    width: 880px;
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: relative;
    backdrop-filter: blur(20px);
  }

  /* Step badge */
  .step-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(217,119,87,0.15);
    border-radius: 12px;
    padding: 8px 18px;
    width: fit-content;
  }

  .step-badge-num {
    font-size: 20px;
    font-weight: 800;
    color: #D97757;
  }

  .step-badge-label {
    font-size: 14px;
    font-weight: 700;
    color: #D97757;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h2 {
    font-size: 52px;
    font-weight: 800;
    line-height: 1.1;
    color: #FFF8F3;
    letter-spacing: -0.02em;
  }

  h2 .accent {
    color: #D97757;
  }

  .body-text {
    font-size: 22px;
    color: rgba(255,248,243,0.65);
    line-height: 1.6;
    font-weight: 400;
    max-width: 680px;
  }

  /* Pro tip box */
  .tip-box {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: rgba(217,119,87,0.08);
    border: 1px solid rgba(217,119,87,0.15);
    border-radius: 16px;
    padding: 20px 24px;
  }

  .tip-icon {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .tip-text {
    font-size: 17px;
    color: rgba(255,248,243,0.75);
    line-height: 1.5;
    font-weight: 500;
  }

  .tip-text strong {
    color: #D97757;
    font-weight: 700;
  }

  /* Bottom bar */
  .bottombar {
    position: absolute;
    bottom: 52px;
    left: 60px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .swipe-hint {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
  }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }
  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: #D97757;
  }
</style>
</head>
<body>

  <div class="glow"></div>
  <div class="glow-2"></div>
  <div class="step-number">{{STEP_NUM}}</div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <span class="brand-name">@claudeprofessor</span>
    </div>
    <div class="slide-pill">{{SLIDE_NUM}} · {{TOTAL_SLIDES}}</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="step-badge">
      <span class="step-badge-num">{{STEP_NUM}}</span>
      <span class="step-badge-label">{{STEP_LABEL}}</span>
    </div>

    <h2>{{TITLE}}</h2>

    <div class="body-text">
      {{BODY}}
    </div>

    <div class="tip-box">
      <span class="tip-icon">💡</span>
      <div class="tip-text">{{TIP}}</div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <span class="swipe-hint">Desliza para más →</span>
    <div class="dots">
      {{DOTS}}
    </div>
  </div>

</body>
</html>
