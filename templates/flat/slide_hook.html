<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #F5F3EF;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Paper grid texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(42,37,32,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,37,32,0.07) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none;
    z-index: 0;
  }

  .topbar {
    position: relative; z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 44px 64px 0;
  }

  .brand-label {
    font-size: 18px;
    font-weight: 500;
    color: rgba(42,37,32,0.45);
    letter-spacing: 0.01em;
  }

  .site-label {
    font-size: 18px;
    font-weight: 500;
    color: rgba(42,37,32,0.45);
  }

  .main {
    position: relative; z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 72px;
    gap: 48px;
  }

  .tag-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .tag-pill {
    background: #D97757;
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    padding: 8px 22px;
    border-radius: 999px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 128px;
    font-weight: 900;
    color: #1A1816;
    line-height: 0.9;
    letter-spacing: -0.04em;
    max-width: 940px;
  }

  h1 .accent {
    color: #D97757;
  }

  .subtitle {
    font-size: 28px;
    font-weight: 500;
    color: rgba(42,37,32,0.6);
    line-height: 1.45;
    max-width: 700px;
    border-left: 5px solid #D97757;
    padding-left: 22px;
  }

  /* Bottom bar */
  .bottombar {
    position: relative; z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 64px 44px;
    border-top: 1.5px solid rgba(42,37,32,0.15);
    margin: 0 56px;
  }

  .author {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar-img {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 2.5px solid #1A1816;
    object-fit: cover;
    background: #0D0D0D;
    flex-shrink: 0;
  }

  .author-text {}

  .author-name {
    font-size: 19px;
    font-weight: 800;
    color: #1A1816;
    line-height: 1.2;
  }

  .author-handle {
    font-size: 15px;
    font-weight: 500;
    color: rgba(42,37,32,0.45);
  }

  .swipe-hint {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 700;
    color: rgba(42,37,32,0.45);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .swipe-arrow {
    width: 40px; height: 40px;
    border: 2px solid rgba(42,37,32,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .swipe-arrow svg {
    width: 14px; height: 14px;
    fill: none;
    stroke: rgba(42,37,32,0.5);
    stroke-width: 2.5;
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand-label">@claudeprofessor</div>
    <div class="site-label">claudeprofessor.page</div>
  </div>

  <div class="main">
    <div class="tag-row">
      <div class="tag-pill">{{TAG}}</div>
    </div>
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </div>

  <div class="bottombar">
    <div class="author">
      <img class="avatar-img" src="{{MASCOT_DATA_URI}}" alt="claudeprofessor" />
      <div class="author-text">
        <div class="author-name">Claude Professor</div>
        <div class="author-handle">@claudeprofessor</div>
      </div>
    </div>
    <div class="swipe-hint">
      Desliza
      <div class="swipe-arrow">
        <svg viewBox="0 0 14 14"><polyline points="5,2 11,7 5,12"/></svg>
      </div>
    </div>
  </div>

</body>
</html>
