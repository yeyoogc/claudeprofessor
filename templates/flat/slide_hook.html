<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #FFFDF9;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 48px 64px 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #2a2520;
    letter-spacing: 0.02em;
  }

  .brand-asterisk {
    width: 22px;
    height: 22px;
  }

  .slide-pill {
    font-size: 16px;
    font-weight: 700;
    color: #2a2520;
    background: #FFF;
    border: 2px solid #2a2520;
    border-radius: 999px;
    padding: 6px 18px;
    letter-spacing: 0.05em;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
    position: relative;
  }

  .title-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
    position: relative;
  }

  .title-line {
    background: #D97757;
    color: white;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    padding: 14px 32px;
    border-radius: 14px;
    letter-spacing: -0.02em;
    display: inline-block;
    max-width: 820px;
  }

  .title-line-2 {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .mascot {
    width: 90px;
    height: 90px;
    background: #D97757;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    color: white;
    border: 3px solid #1A1816;
  }

  .subtitle-wrap {
    margin-top: 64px;
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
  }

  .subtitle-text {
    font-size: 32px;
    font-weight: 700;
    color: #1A1816;
    line-height: 1.3;
    max-width: 720px;
    position: relative;
    padding-bottom: 10px;
  }

  .subtitle-text::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 60%;
    height: 6px;
    background: #D97757;
    border-radius: 4px;
    transform: rotate(-0.5deg);
  }

  .arrow-right {
    font-size: 32px;
    color: #1A1816;
    font-weight: 800;
  }

  .icons-row {
    display: flex;
    gap: 20px;
    margin-top: 100px;
  }

  .icon-box {
    width: 140px;
    height: 140px;
    background: #D97757;
    border-radius: 18px;
    border: 3px solid #1A1816;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .icon-box svg {
    width: 70px;
    height: 70px;
    stroke: #1A1816;
    stroke-width: 3;
    fill: #FFFDF9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Sparkle decorations */
  .deco {
    position: absolute;
    color: #D97757;
  }
  .deco-1 { top: 40px; right: 200px; font-size: 42px; }
  .deco-2 { top: 180px; right: 90px; font-size: 24px; }
  .deco-3 { bottom: 320px; right: 80px; font-size: 32px; }

  /* Bottom bar */
  .bottombar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 64px 48px;
    border-top: 2px solid #1A1816;
    margin: 0 60px;
  }

  .author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D97757, #e8956e);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 900;
    font-size: 20px;
  }

  .handle {
    font-size: 20px;
    font-weight: 700;
    color: #1A1816;
  }

  .swipe-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FFF;
    border: 2px solid #1A1816;
    border-radius: 999px;
    padding: 10px 22px;
    font-size: 18px;
    font-weight: 800;
    color: #1A1816;
  }
</style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <svg class="brand-asterisk" viewBox="0 0 100 100" fill="#D97757">
        <rect x="44" y="5" width="12" height="90" rx="6"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(45 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(90 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(135 50 50)"/>
      </svg>
      <span>@claudeprofessor</span>
    </div>
    <div class="slide-pill">01 / {{TOTAL_SLIDES}}</div>
  </div>

  <!-- Decorative sparkles -->
  <div class="deco deco-1">✦</div>
  <div class="deco deco-2">✦</div>
  <div class="deco deco-3">✦</div>

  <!-- Main content -->
  <div class="main">
    <div class="title-wrap">
      <div class="title-line">{{TITLE}}</div>
      <div class="title-line-2">
        <div class="title-line">{{TAG}}</div>
        <div class="mascot">✳</div>
      </div>
    </div>

    <div class="subtitle-wrap">
      <div class="subtitle-text">{{SUBTITLE}}</div>
      <span class="arrow-right">→</span>
    </div>

    <div class="icons-row">
      <div class="icon-box">
        <svg viewBox="0 0 60 60">
          <circle cx="30" cy="30" r="6"/>
          <line x1="30" y1="24" x2="30" y2="8"/>
          <line x1="30" y1="36" x2="30" y2="52"/>
          <line x1="24" y1="30" x2="8" y2="30"/>
          <line x1="36" y1="30" x2="52" y2="30"/>
          <circle cx="30" cy="8" r="4"/>
          <circle cx="30" cy="52" r="4"/>
          <circle cx="8" cy="30" r="4"/>
          <circle cx="52" cy="30" r="4"/>
        </svg>
      </div>
      <div class="icon-box">
        <svg viewBox="0 0 60 60">
          <rect x="14" y="10" width="30" height="40" rx="3"/>
          <rect x="20" y="16" width="30" height="40" rx="3"/>
          <line x1="26" y1="28" x2="42" y2="28"/>
          <line x1="26" y1="36" x2="42" y2="36"/>
          <line x1="26" y1="44" x2="36" y2="44"/>
        </svg>
      </div>
      <div class="icon-box">
        <svg viewBox="0 0 60 60">
          <polygon points="30,8 38,22 52,22 42,32 46,48 30,40 14,48 18,32 8,22 22,22"/>
        </svg>
      </div>
      <div class="icon-box">
        <svg viewBox="0 0 60 60">
          <rect x="10" y="14" width="40" height="28" rx="3"/>
          <line x1="18" y1="24" x2="42" y2="24"/>
          <line x1="18" y1="32" x2="34" y2="32"/>
          <line x1="30" y1="42" x2="30" y2="52"/>
          <line x1="22" y1="52" x2="38" y2="52"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <div class="author">
      <div class="avatar">✳</div>
      <span class="handle">@claudeprofessor</span>
    </div>
    <div class="swipe-btn">Swipe <span>👆</span></div>
  </div>

</body>
</html>
