<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #F5F3EF;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(42,37,32,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,37,32,0.07) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none;
    z-index: 0;
  }

  .topbar {
    position: relative; z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 44px 64px 0;
  }

  .step-badge {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .step-num {
    background: #1A1816;
    color: #F5F3EF;
    width: 72px;
    height: 72px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: -0.04em;
  }

  .step-label {
    background: #D97757;
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    padding: 10px 22px;
    border-radius: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .slide-counter {
    font-size: 16px;
    font-weight: 600;
    color: rgba(42,37,32,0.35);
    letter-spacing: 0.08em;
  }

  .main {
    position: relative; z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 44px 72px 0;
    gap: 28px;
  }

  h2 {
    font-size: 72px;
    font-weight: 900;
    line-height: 0.95;
    color: #1A1816;
    letter-spacing: -0.035em;
    max-width: 920px;
  }

  h2 .accent {
    color: #D97757;
  }

  .body-text {
    font-size: 28px;
    color: rgba(42,37,32,0.75);
    line-height: 1.5;
    font-weight: 500;
    max-width: 880px;
    padding-left: 24px;
    border-left: 5px solid rgba(42,37,32,0.15);
  }

  .tip-box {
    background: #fff;
    border: 2px solid #1A1816;
    border-radius: 16px;
    padding: 22px 28px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    box-shadow: 6px 6px 0 #D97757;
    max-width: 880px;
  }

  .tip-label {
    background: #1A1816;
    color: #F5F3EF;
    font-size: 12px;
    font-weight: 900;
    padding: 5px 12px;
    border-radius: 6px;
    letter-spacing: 0.12em;
    white-space: nowrap;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .tip-text {
    font-size: 22px;
    color: #1A1816;
    line-height: 1.4;
    font-weight: 600;
  }

  .tip-text strong { color: #D97757; font-weight: 900; }

  /* Bottom bar */
  .bottombar {
    position: relative; z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 64px 40px;
    border-top: 1.5px solid rgba(42,37,32,0.15);
    margin: 0 56px;
    margin-top: auto;
  }

  .author {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar-img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #1A1816;
    object-fit: cover;
    background: #0D0D0D;
    flex-shrink: 0;
  }

  .author-name {
    font-size: 17px;
    font-weight: 800;
    color: #1A1816;
    line-height: 1.2;
  }

  .author-handle {
    font-size: 14px;
    font-weight: 500;
    color: rgba(42,37,32,0.4);
  }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: rgba(42,37,32,0.18);
  }

  .dot.active {
    width: 26px;
    border-radius: 4px;
    background: #D97757;
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="step-badge">
      <div class="step-num">{{STEP_NUM}}</div>
      <div class="step-label">{{STEP_LABEL}}</div>
    </div>
    <div class="slide-counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="main">
    <h2>{{TITLE}}</h2>
    <div class="body-text">{{BODY}}</div>
    <div class="tip-box">
      <div class="tip-label">TIP</div>
      <div class="tip-text">{{TIP}}</div>
    </div>
  </div>

  <div class="bottombar">
    <div class="author">
      <img class="avatar-img" src="{{MASCOT_DATA_URI}}" alt="claudeprofessor" />
      <div>
        <div class="author-name">Claude Professor</div>
        <div class="author-handle">@claudeprofessor</div>
      </div>
    </div>
    <div class="dots">{{DOTS}}</div>
  </div>

</body>
</html>
