<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #F5F3EF;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(42,37,32,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,37,32,0.07) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none;
    z-index: 0;
  }

  .topbar {
    position: relative; z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 44px 64px 0;
  }

  .brand-label {
    font-size: 18px;
    font-weight: 500;
    color: rgba(42,37,32,0.4);
  }

  .slide-counter {
    font-size: 16px;
    font-weight: 600;
    color: rgba(42,37,32,0.3);
    letter-spacing: 0.08em;
  }

  .main {
    position: relative; z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 72px;
    gap: 32px;
  }

  /* Featured mascot */
  .mascot-featured {
    width: 160px;
    height: 160px;
    border-radius: 24px;
    border: 3px solid #1A1816;
    object-fit: cover;
    background: #0D0D0D;
    box-shadow: 8px 8px 0 #D97757;
  }

  .cta-title {
    font-size: 88px;
    font-weight: 900;
    color: #1A1816;
    line-height: 0.92;
    letter-spacing: -0.04em;
    max-width: 880px;
  }

  .cta-title .accent { color: #D97757; }

  .cta-subtitle {
    font-size: 26px;
    color: rgba(42,37,32,0.55);
    font-weight: 500;
    line-height: 1.45;
    max-width: 680px;
    padding-left: 22px;
    border-left: 5px solid #D97757;
  }

  /* Bottom bar */
  .bottombar {
    position: relative; z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 64px 44px;
    border-top: 1.5px solid rgba(42,37,32,0.15);
    margin: 0 56px;
  }

  .author {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar-img {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 2.5px solid #1A1816;
    object-fit: cover;
    background: #0D0D0D;
    flex-shrink: 0;
  }

  .author-name {
    font-size: 19px;
    font-weight: 800;
    color: #1A1816;
    line-height: 1.2;
  }

  .author-handle {
    font-size: 15px;
    font-weight: 500;
    color: rgba(42,37,32,0.4);
  }

  .save-hint {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 17px;
    font-weight: 800;
    color: rgba(42,37,32,0.5);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .save-icon {
    width: 38px; height: 38px;
    fill: rgba(42,37,32,0.4);
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand-label">@claudeprofessor</div>
    <div class="slide-counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="main">
    <img class="mascot-featured" src="{{MASCOT_DATA_URI}}" alt="Claude Professor" />
    <div class="cta-title">{{CTA_TITLE}}</div>
    <p class="cta-subtitle">{{CTA_SUBTITLE}}</p>
  </div>

  <div class="bottombar">
    <div class="author">
      <img class="avatar-img" src="{{MASCOT_DATA_URI}}" alt="claudeprofessor" />
      <div>
        <div class="author-name">Claude Professor</div>
        <div class="author-handle">@claudeprofessor</div>
      </div>
    </div>
    <div class="save-hint">
      <svg class="save-icon" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      GUARDAR
    </div>
  </div>

</body>
</html>
