<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #FFFDF9;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 48px 64px 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #2a2520;
  }

  .brand-asterisk {
    width: 22px;
    height: 22px;
  }

  .slide-pill {
    font-size: 16px;
    font-weight: 700;
    color: #2a2520;
    background: #FFF;
    border: 2px solid #2a2520;
    border-radius: 999px;
    padding: 6px 18px;
    letter-spacing: 0.05em;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 80px;
    gap: 36px;
    text-align: center;
    position: relative;
  }

  .logo-big {
    width: 140px;
    height: 140px;
    background: #D97757;
    border-radius: 24px;
    border: 4px solid #1A1816;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 10px 10px 0 #1A1816;
    margin-bottom: 12px;
  }

  .logo-big svg {
    width: 80px;
    height: 80px;
    fill: white;
  }

  .cta-title {
    background: #1A1816;
    color: #FFFDF9;
    font-size: 60px;
    font-weight: 900;
    line-height: 1.05;
    padding: 18px 36px;
    border-radius: 18px;
    letter-spacing: -0.02em;
    max-width: 860px;
    display: inline-block;
  }

  .cta-subtitle {
    font-size: 28px;
    color: #1A1816;
    font-weight: 700;
    line-height: 1.3;
    max-width: 680px;
    position: relative;
    padding-bottom: 10px;
  }

  .cta-subtitle::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -4px;
    width: 50%;
    transform: translateX(-50%) rotate(-0.5deg);
    height: 6px;
    background: #D97757;
    border-radius: 4px;
  }

  .follow-btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #D97757;
    color: white;
    border-radius: 999px;
    padding: 22px 50px;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 0.02em;
    border: 3px solid #1A1816;
    box-shadow: 8px 8px 0 #1A1816;
    margin-top: 12px;
  }

  .benefits-row {
    display: flex;
    gap: 18px;
    margin-top: 16px;
  }

  .benefit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .benefit-icon {
    width: 100px;
    height: 100px;
    background: #FFF;
    border: 3px solid #1A1816;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }

  .benefit-label {
    font-size: 16px;
    font-weight: 800;
    color: #1A1816;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Deco */
  .deco {
    position: absolute;
    color: #D97757;
  }
  .deco-1 { top: 60px; right: 220px; font-size: 36px; }
  .deco-2 { top: 240px; left: 80px; font-size: 26px; }
  .deco-3 { bottom: 300px; right: 100px; font-size: 30px; }

  /* Bottom bar */
  .bottombar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 64px 48px;
    border-top: 2px solid #1A1816;
    margin: 0 60px;
  }

  .author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D97757, #e8956e);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 900;
    font-size: 20px;
  }

  .handle {
    font-size: 20px;
    font-weight: 700;
    color: #1A1816;
  }

  .thanks {
    font-size: 18px;
    font-weight: 700;
    color: #D97757;
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <svg class="brand-asterisk" viewBox="0 0 100 100" fill="#D97757">
        <rect x="44" y="5" width="12" height="90" rx="6"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(45 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(90 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(135 50 50)"/>
      </svg>
      <span>@claudeprofessor</span>
    </div>
    <div class="slide-pill">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="deco deco-1">✦</div>
  <div class="deco deco-2">✦</div>
  <div class="deco deco-3">✦</div>

  <div class="main">
    <div class="logo-big">
      <svg viewBox="0 0 100 100">
        <rect x="44" y="5" width="12" height="90" rx="6"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(45 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(90 50 50)"/>
        <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(135 50 50)"/>
      </svg>
    </div>

    <div class="cta-title">{{CTA_TITLE}}</div>

    <div class="cta-subtitle">{{CTA_SUBTITLE}}</div>

    <div class="follow-btn">
      Seguir @claudeprofessor <span>→</span>
    </div>

    <div class="benefits-row">
      <div class="benefit">
        <div class="benefit-icon">📚</div>
        <div class="benefit-label">Tips diarios</div>
      </div>
      <div class="benefit">
        <div class="benefit-icon">🧠</div>
        <div class="benefit-label">Aprende IA</div>
      </div>
      <div class="benefit">
        <div class="benefit-icon">⚡</div>
        <div class="benefit-label">Productividad</div>
      </div>
    </div>
  </div>

  <div class="bottombar">
    <div class="author">
      <div class="avatar">✳</div>
      <span class="handle">@claudeprofessor</span>
    </div>
    <div class="thanks">¡Gracias por leer! 🧡</div>
  </div>

</body>
</html>
