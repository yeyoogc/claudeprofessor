<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,900;1,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
      background: #0D0D0D;
      overflow: hidden;
      position: relative;
    }

    /* Coral accent band at top */
    .band {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 280px;
      background: #D97757;
      clip-path: polygon(0 0, 100% 0, 100% 72%, 0 100%);
    }

    /* Ghost CTA label inside band */
    .band-ghost {
      position: absolute;
      top: -32px;
      right: -16px;
      font-size: 300px;
      font-weight: 900;
      color: rgba(0,0,0,0.1);
      line-height: 1;
      letter-spacing: -0.06em;
      user-select: none;
    }

    /* Top */
    .top {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 44px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .handle {
      font-size: 16px;
      font-weight: 700;
      color: rgba(0,0,0,0.45);
      letter-spacing: 0.06em;
      text-transform: lowercase;
    }

    .counter {
      font-size: 15px;
      font-weight: 700;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.1em;
    }

    /* Bottom content */
    .content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 52px 56px;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 900;
      color: #D97757;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .eyebrow::before {
      content: '';
      width: 32px; height: 2px;
      background: #D97757;
    }

    h1 {
      font-size: 104px;
      font-weight: 900;
      color: #fff;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: 28px;
      max-width: 940px;
    }

    h1 .accent {
      color: #D97757;
      font-style: italic;
    }

    .cta-sub {
      font-size: 26px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
      max-width: 700px;
      margin-bottom: 44px;
    }

    /* Follow line */
    .follow-line {
      display: flex;
      align-items: center;
      margin-bottom: 40px;
    }

    .follow-at {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .follow-sep {
      font-size: 22px;
      color: rgba(255,255,255,0.2);
      margin: 0 16px;
    }

    .follow-action {
      font-size: 20px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
    }

    /* Bottom bar */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .foot-handle {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.04em;
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }

    .dot.active {
      width: 28px;
      border-radius: 4px;
      background: #D97757;
    }
  </style>
</head>
<body>

  <div class="band">
    <div class="band-ghost">FIN</div>
  </div>

  <div class="top">
    <div class="handle">claudeprofessor</div>
    <div class="counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="content">
    <div class="eyebrow">cada día un nuevo truco</div>
    <h1>{{CTA_TITLE}}</h1>
    <p class="cta-sub">{{CTA_SUBTITLE}}</p>
    <div class="follow-line">
      <span class="follow-at">@claudeprofessor</span>
      <span class="follow-sep">·</span>
      <span class="follow-action">Claude AI en español</span>
    </div>
    <div class="bottom">
      <div class="foot-handle">claudeprofessor.page</div>
      <div class="dots">{{DOTS}}</div>
    </div>
  </div>

</body>
</html>
