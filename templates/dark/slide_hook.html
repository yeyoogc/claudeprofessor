<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Inter', sans-serif;
      background: #0D0D0D;
      overflow: hidden;
      position: relative;
    }

    /* Coral accent band — top of slide */
    .band {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 320px;
      background: #D97757;
      clip-path: polygon(0 0, 100% 0, 100% 78%, 0 100%);
    }

    /* Faint category ghost inside band */
    .band-ghost {
      position: absolute;
      top: -24px;
      right: -20px;
      font-size: 340px;
      font-weight: 900;
      color: rgba(0,0,0,0.12);
      line-height: 1;
      letter-spacing: -0.06em;
      user-select: none;
    }

    /* Top row */
    .top {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 44px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .handle {
      font-size: 16px;
      font-weight: 700;
      color: rgba(0,0,0,0.5);
      letter-spacing: 0.06em;
      text-transform: lowercase;
    }

    .category-tag {
      font-size: 13px;
      font-weight: 800;
      color: rgba(0,0,0,0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Main text — bottom-anchored */
    .text {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 52px 56px;
    }

    h1 {
      font-size: 112px;
      font-weight: 900;
      color: #fff;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: 28px;
      max-width: 960px;
    }

    h1 .accent {
      color: #D97757;
      font-style: italic;
    }

    .sub {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
      max-width: 700px;
      margin-bottom: 40px;
    }

    /* Bottom bar */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .author-name {
      font-size: 17px;
      font-weight: 800;
      color: rgba(255,255,255,0.85);
      letter-spacing: -0.01em;
    }

    .author-sep {
      font-size: 17px;
      color: rgba(255,255,255,0.2);
      margin: 0 12px;
    }

    .author-tag {
      font-size: 15px;
      color: rgba(255,255,255,0.3);
    }

    .swipe-hint {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .swipe-arrow {
      width: 36px; height: 36px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .swipe-arrow svg {
      width: 14px; height: 14px;
      fill: none;
      stroke: rgba(255,255,255,0.45);
      stroke-width: 2;
    }
  </style>
</head>
<body>

  <div class="band">
    <div class="band-ghost">{{TAG}}</div>
  </div>

  <div class="top">
    <div class="handle">claudeprofessor</div>
    <div class="category-tag">{{TAG}}</div>
  </div>

  <div class="text">
    <h1>{{TITLE}}</h1>
    <p class="sub">{{SUBTITLE}}</p>
    <div class="bottom">
      <div style="display:flex;align-items:center;">
        <span class="author-name">@claudeprofessor</span>
        <span class="author-sep">·</span>
        <span class="author-tag">Claude AI en español</span>
      </div>
      <div class="swipe-hint">
        Desliza
        <div class="swipe-arrow">
          <svg viewBox="0 0 14 14"><polyline points="5,2 11,7 5,12"/></svg>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
