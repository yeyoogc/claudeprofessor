<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:#F2EFE9; --surface:#111010; --text:#111010;
    --accent:#D97757; --muted:rgba(17,16,16,0.5); --border:rgba(17,16,16,0.1);
  }
  .palette-night  { --bg:#0D0D0D; --surface:#1A1816; --text:#F2EFE9; --accent:#D97757; --muted:rgba(242,239,233,0.45); --border:rgba(242,239,233,0.08); }
  .palette-slate  { --bg:#1B2340; --surface:#252F4A; --text:#E8EAF0; --accent:#D97757; --muted:rgba(232,234,240,0.45); --border:rgba(232,234,240,0.1); }
  .palette-sand   { --bg:#F5F0E8; --surface:#2A2520; --text:#2A2520; --accent:#C4623E; --muted:rgba(42,37,32,0.45); --border:rgba(42,37,32,0.1); }
  .palette-ink    { --bg:#F8F8F6; --surface:#111; --text:#111; --accent:#E05A2B; --muted:rgba(17,17,17,0.4); --border:rgba(17,17,17,0.08); }
  .palette-dusk   { --bg:#1C1624; --surface:#251D30; --text:#EDE8F5; --accent:#D97757; --muted:rgba(237,232,245,0.4); --border:rgba(237,232,245,0.08); }

  body {
    width:1080px; height:1080px;
    background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif;
    overflow:hidden; position:relative;
    display:flex; flex-direction:column;
  }

  /* Ghost number — all layouts */
  .ghost { position:absolute; right:-10px; bottom:40px; font-size:420px; font-weight:900; color:var(--border); line-height:1; letter-spacing:-0.05em; pointer-events:none; z-index:0; user-select:none; }

  /* Topbar */
  .topbar { position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; padding:44px 64px 0; }
  .step-badge { display:flex; align-items:center; gap:12px; }
  .step-num { width:58px; height:58px; background:var(--surface); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:900; color:var(--bg); letter-spacing:-0.04em; flex-shrink:0; }
  .palette-night .step-num, .palette-slate .step-num, .palette-dusk .step-num { color:var(--text); }
  .step-label { font-size:12px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); }
  .counter { font-size:13px; font-weight:700; color:var(--muted); letter-spacing:0.06em; }

  /* Content area */
  .main { position:relative; z-index:2; flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 68px; gap:28px; }

  /* Layout variants for content */
  .layout-a .main, .layout-d .main { padding:0 72px; }
  .layout-b .main { padding:0 68px; }
  .layout-c .main { padding:0 68px; }
  .layout-e .main { padding:0 68px; }

  .accent-line { width:52px; height:5px; background:var(--accent); border-radius:3px; }

  h2 { font-size:74px; font-weight:900; color:var(--text); line-height:0.93; letter-spacing:-0.04em; max-width:920px; }
  h2 .accent { color:var(--accent); font-style:italic; }

  .body-text { font-size:25px; font-weight:500; color:var(--muted); line-height:1.55; max-width:840px; }

  /* Layout-specific body treatment */
  .layout-b .body-text { border-left:4px solid var(--accent); padding-left:20px; }
  .layout-c .body-text { border-left:4px solid var(--accent); padding-left:20px; }

  /* Tip */
  .tip { display:flex; align-items:flex-start; gap:12px; padding:18px 22px; border-radius:14px; max-width:880px; }
  .layout-a .tip, .layout-d .tip { background:var(--surface); }
  .layout-b .tip, .layout-e .tip { background:transparent; border:1.5px solid var(--border); }
  .layout-c .tip { background:var(--accent); }
  .tip-tag { font-size:10px; font-weight:900; letter-spacing:0.16em; text-transform:uppercase; white-space:nowrap; margin-top:4px; flex-shrink:0; }
  .layout-a .tip-tag, .layout-d .tip-tag { color:var(--accent); }
  .layout-b .tip-tag, .layout-e .tip-tag { color:var(--accent); }
  .layout-c .tip-tag { color:rgba(255,255,255,0.7); }
  .tip-text { font-size:20px; font-weight:500; line-height:1.45; }
  .layout-a .tip-text, .layout-d .tip-text { color:rgba(242,239,233,0.82); }
  .layout-b .tip-text, .layout-e .tip-text { color:var(--text); }
  .layout-c .tip-text { color:#fff; }
  .tip-text strong { font-weight:800; }
  .layout-a .tip-text strong, .layout-d .tip-text strong { color:var(--accent); }
  .layout-b .tip-text strong, .layout-e .tip-text strong { color:var(--accent); }
  .layout-c .tip-text strong { color:rgba(255,255,255,0.9); }

  /* Bottom bar */
  .bottombar { position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; padding:18px 64px 42px; border-top:1.5px solid var(--border); margin:0 48px; margin-top:auto; }
  .author { display:flex; align-items:center; gap:12px; }
  .avatar { width:50px; height:50px; border-radius:50%; border:2px solid var(--border); object-fit:cover; flex-shrink:0; }
  .author-name { font-size:15px; font-weight:800; color:var(--text); line-height:1.2; }
  .author-handle { font-size:13px; font-weight:500; color:var(--muted); }
  .dots { display:flex; gap:7px; align-items:center; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--border); }
  .dot.active { width:22px; border-radius:4px; background:var(--accent); }
</style>
</head>
<body class="{{PALETTE}} {{LAYOUT}}">
  <div class="ghost">{{STEP_NUM}}</div>

  <div class="topbar">
    <div class="step-badge">
      <div class="step-num">{{STEP_NUM}}</div>
      <div class="step-label">{{STEP_LABEL}}</div>
    </div>
    <div class="counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="main">
    <div class="accent-line"></div>
    <h2>{{TITLE}}</h2>
    <div class="body-text">{{BODY}}</div>
    <div class="tip">
      <div class="tip-tag">TIP</div>
      <div class="tip-text">{{TIP}}</div>
    </div>
  </div>

  <div class="bottombar">
    <div class="author">
      <img class="avatar" src="{{MASCOT_DATA_URI}}" />
      <div>
        <div class="author-name">Claude Professor</div>
        <div class="author-handle">@claudeprofessor</div>
      </div>
    </div>
    <div class="dots">{{DOTS}}</div>
  </div>
</body>
</html>
