<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #F2EFE9;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Ghost step number — massive background anchor */
  .ghost-num {
    position: absolute;
    right: -20px;
    bottom: 60px;
    font-size: 420px;
    font-weight: 900;
    color: rgba(17,16,16,0.055);
    line-height: 1;
    letter-spacing: -0.05em;
    pointer-events: none;
    z-index: 0;
    user-select: none;
  }

  /* Top bar */
  .topbar {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 44px 64px 0;
  }

  .step-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .step-num {
    width: 60px;
    height: 60px;
    background: #111010;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    color: #F2EFE9;
    letter-spacing: -0.04em;
    flex-shrink: 0;
  }

  .step-label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #D97757;
  }

  .slide-counter {
    font-size: 14px;
    font-weight: 700;
    color: rgba(17,16,16,0.25);
    letter-spacing: 0.06em;
  }

  /* Main content */
  .main {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 72px;
    gap: 30px;
  }

  /* Coral accent line above title */
  .accent-line {
    width: 56px;
    height: 5px;
    background: #D97757;
    border-radius: 3px;
  }

  h2 {
    font-size: 76px;
    font-weight: 900;
    color: #111010;
    line-height: 0.93;
    letter-spacing: -0.04em;
    max-width: 900px;
  }

  h2 .accent {
    color: #D97757;
    font-style: italic;
  }

  .body-text {
    font-size: 26px;
    font-weight: 500;
    color: rgba(17,16,16,0.6);
    line-height: 1.55;
    max-width: 800px;
  }

  /* Tip — inline strip, not a box */
  .tip-strip {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 20px 24px;
    background: #111010;
    border-radius: 14px;
    max-width: 840px;
  }

  .tip-tag {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #D97757;
    white-space: nowrap;
    margin-top: 3px;
    flex-shrink: 0;
  }

  .tip-text {
    font-size: 20px;
    font-weight: 500;
    color: rgba(242,239,233,0.85);
    line-height: 1.45;
  }

  .tip-text strong { color: #D97757; font-weight: 800; }

  /* Bottom bar */
  .bottombar {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 64px 44px;
    border-top: 1.5px solid rgba(17,16,16,0.1);
    margin: 0 48px;
    margin-top: auto;
  }

  .author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid #111010;
    object-fit: cover;
    background: #111010;
    flex-shrink: 0;
  }

  .author-name {
    font-size: 16px;
    font-weight: 800;
    color: #111010;
    line-height: 1.2;
  }

  .author-handle {
    font-size: 13px;
    font-weight: 500;
    color: rgba(17,16,16,0.4);
  }

  .dots {
    display: flex;
    gap: 7px;
    align-items: center;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(17,16,16,0.15);
  }

  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: #D97757;
  }
</style>
</head>
<body>

  <div class="ghost-num">{{STEP_NUM}}</div>

  <div class="topbar">
    <div class="step-row">
      <div class="step-num">{{STEP_NUM}}</div>
      <div class="step-label">{{STEP_LABEL}}</div>
    </div>
    <div class="slide-counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  </div>

  <div class="main">
    <div class="accent-line"></div>
    <h2>{{TITLE}}</h2>
    <div class="body-text">{{BODY}}</div>
    <div class="tip-strip">
      <div class="tip-tag">TIP</div>
      <div class="tip-text">{{TIP}}</div>
    </div>
  </div>

  <div class="bottombar">
    <div class="author">
      <img class="avatar" src="{{MASCOT_DATA_URI}}" alt="claudeprofessor" />
      <div>
        <div class="author-name">Claude Professor</div>
        <div class="author-handle">@claudeprofessor</div>
      </div>
    </div>
    <div class="dots">{{DOTS}}</div>
  </div>

</body>
</html>
