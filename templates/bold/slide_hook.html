<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #F2EFE9;
    font-family: 'Inter', sans-serif;
    display: grid;
    grid-template-rows: 1fr auto;
    overflow: hidden;
    position: relative;
  }

  /* Left black column */
  .col-black {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 420px;
    background: #111010;
    z-index: 0;
  }

  /* Coral bar — vertical accent on edge of black col */
  .col-black::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 6px;
    background: #D97757;
  }

  /* Tag on black col */
  .tag {
    position: absolute;
    top: 52px;
    left: 48px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #D97757;
    z-index: 2;
  }

  /* Big number watermark */
  .bg-num {
    position: absolute;
    bottom: -40px;
    left: 0;
    font-size: 340px;
    font-weight: 900;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    letter-spacing: -0.06em;
    z-index: 1;
    white-space: nowrap;
    pointer-events: none;
    width: 420px;
    overflow: hidden;
  }

  /* Main content area (right side) */
  .main {
    position: relative;
    z-index: 2;
    padding: 52px 60px 0 468px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 32px;
    height: 100%;
  }

  /* White number badge */
  .num-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    background: #D97757;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.03em;
  }

  h1 {
    font-size: 84px;
    font-weight: 900;
    color: #111010;
    line-height: 0.93;
    letter-spacing: -0.04em;
    max-width: 540px;
  }

  h1 .accent { color: #D97757; font-style: italic; }

  .subtitle {
    font-size: 22px;
    font-weight: 500;
    color: rgba(17,16,16,0.55);
    line-height: 1.5;
    max-width: 480px;
    border-left: 4px solid #D97757;
    padding-left: 18px;
  }

  /* Left col — mascot + handle stacked */
  .left-content {
    position: absolute;
    left: 0;
    top: 0;
    width: 420px;
    height: 1080px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .mascot-wrap {
    width: 180px;
    height: 180px;
    border-radius: 28px;
    border: 3px solid rgba(255,255,255,0.15);
    overflow: hidden;
    background: #1a1918;
    box-shadow: 0 0 0 6px rgba(217,119,87,0.18);
  }

  .mascot-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .handle {
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
  }

  /* Bottom bar */
  .bottombar {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 60px 44px 468px;
    gap: 12px;
  }

  .swipe {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(17,16,16,0.35);
  }

  .swipe-circle {
    width: 40px;
    height: 40px;
    border: 2px solid rgba(17,16,16,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .swipe-circle svg {
    width: 13px;
    height: 13px;
    stroke: rgba(17,16,16,0.4);
    fill: none;
    stroke-width: 2.5;
  }
</style>
</head>
<body>

  <div class="col-black">
    <div class="bg-num">01</div>
  </div>

  <div class="left-content">
    <div class="mascot-wrap">
      <img src="{{MASCOT_DATA_URI}}" alt="Claude Professor" />
    </div>
    <div class="handle">@claudeprofessor</div>
  </div>

  <div class="tag">{{TAG}}</div>

  <div class="main">
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </div>

  <div class="bottombar">
    <div class="swipe">
      Desliza
      <div class="swipe-circle">
        <svg viewBox="0 0 14 14"><polyline points="4,2 10,7 4,12"/></svg>
      </div>
    </div>
  </div>

</body>
</html>
