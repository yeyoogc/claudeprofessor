<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(145deg, #D97757 0%, #c4623f 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Dot grid */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1.5px, transparent 1.5px);
    background-size: 40px 40px;
  }

  /* Multiple sparkles */
  .spark {
    position: absolute;
    color: rgba(255,255,255,0.6);
    line-height: 1;
  }
  .spark-1 { top: 100px; left: 120px; font-size: 32px; }
  .spark-2 { top: 180px; right: 140px; font-size: 20px; opacity: 0.5; }
  .spark-3 { bottom: 200px; left: 90px; font-size: 24px; opacity: 0.45; }
  .spark-4 { bottom: 160px; right: 100px; font-size: 18px; opacity: 0.35; }
  .spark-5 { top: 300px; left: 200px; font-size: 14px; opacity: 0.3; }
  .spark-6 { top: 260px; right: 220px; font-size: 26px; opacity: 0.55; }

  /* Large asterisk center bg */
  .bg-asterisk {
    position: absolute;
    opacity: 0.06;
  }

  /* Top bar */
  .topbar {
    position: absolute;
    top: 56px;
    left: 60px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand-name {
    font-size: 20px;
    font-weight: 700;
    color: rgba(255,255,255,0.90);
    letter-spacing: 0.02em;
  }

  .slide-pill {
    background: rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
  }

  /* Center content */
  .center-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .logo-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.2);
  }

  .cta-title {
    font-size: 56px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    letter-spacing: -0.02em;
    max-width: 700px;
  }

  .cta-subtitle {
    font-size: 22px;
    color: rgba(255,255,255,0.80);
    font-weight: 500;
    line-height: 1.5;
    max-width: 500px;
  }

  .follow-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: white;
    color: #D97757;
    border-radius: 999px;
    padding: 18px 44px;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
    box-shadow: 0 12px 40px rgba(0,0,0,0.20);
  }

  .follow-btn .arrow {
    font-size: 22px;
  }

  .stats-row {
    display: flex;
    gap: 40px;
    margin-top: 8px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-emoji {
    font-size: 24px;
  }

  .stat-text {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Bottom */
  .bottombar {
    position: absolute;
    bottom: 52px;
    left: 60px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .swipe-hint {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
  }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }
  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: rgba(255,255,255,0.9);
  }
</style>
</head>
<body>

  <!-- Sparkles -->
  <div class="spark spark-1">✦</div>
  <div class="spark spark-2">✦</div>
  <div class="spark spark-3">✦</div>
  <div class="spark spark-4">✦</div>
  <div class="spark spark-5">✦</div>
  <div class="spark spark-6">✦</div>

  <!-- Background asterisk -->
  <div class="bg-asterisk">
    <svg width="700" height="700" viewBox="0 0 100 100" fill="none">
      <g fill="white">
        <rect x="46" y="5" width="8" height="90" rx="4"/>
        <rect x="46" y="5" width="8" height="90" rx="4" transform="rotate(45 50 50)"/>
        <rect x="46" y="5" width="8" height="90" rx="4" transform="rotate(90 50 50)"/>
        <rect x="46" y="5" width="8" height="90" rx="4" transform="rotate(135 50 50)"/>
      </g>
    </svg>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <span class="brand-name">@claudeprofessor</span>
    <div class="slide-pill">{{SLIDE_NUM}} · {{TOTAL_SLIDES}}</div>
  </div>

  <!-- Center CTA -->
  <div class="center-block">
    <div class="logo-circle">
      <svg width="56" height="56" viewBox="0 0 100 100" fill="none">
        <g fill="white">
          <rect x="44" y="5" width="12" height="90" rx="6"/>
          <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(45 50 50)"/>
          <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(90 50 50)"/>
          <rect x="44" y="5" width="12" height="90" rx="6" transform="rotate(135 50 50)"/>
        </g>
      </svg>
    </div>

    <div class="cta-title">{{CTA_TITLE}}</div>

    <div class="cta-subtitle">{{CTA_SUBTITLE}}</div>

    <div class="follow-btn">
      Seguir @claudeprofessor
      <span class="arrow">→</span>
    </div>

    <div class="stats-row">
      <div class="stat">
        <span class="stat-emoji">📚</span>
        <span class="stat-text">Tips diarios</span>
      </div>
      <div class="stat">
        <span class="stat-emoji">🧠</span>
        <span class="stat-text">Aprende IA</span>
      </div>
      <div class="stat">
        <span class="stat-emoji">⚡</span>
        <span class="stat-text">Productividad</span>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <span class="swipe-hint">¡Gracias por leer! 🧡</span>
    <div class="dots">
      {{DOTS}}
    </div>
  </div>

</body>
</html>
