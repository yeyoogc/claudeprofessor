<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #D97757;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Subtle dot grid */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.10) 1.5px, transparent 1.5px);
    background-size: 40px 40px;
  }

  /* Big background Claude asterisk */
  .bg-asterisk {
    position: absolute;
    bottom: -120px;
    right: -100px;
    opacity: 0.08;
  }

  /* Decorative sparkles */
  .spark {
    position: absolute;
    color: rgba(255,255,255,0.7);
    font-size: 36px;
    line-height: 1;
  }
  .spark-1 { top: 80px; right: 160px; font-size: 28px; }
  .spark-2 { top: 150px; right: 90px; font-size: 18px; opacity: 0.5; }
  .spark-3 { bottom: 180px; left: 60px; font-size: 22px; opacity: 0.6; }
  .spark-4 { top: 220px; left: 48px; font-size: 16px; opacity: 0.4; }
  .spark-5 { bottom: 280px; right: 50px; font-size: 14px; opacity: 0.35; }

  /* Top bar */
  .topbar {
    position: absolute;
    top: 56px;
    left: 60px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-logo {
    width: 36px;
    height: 36px;
  }

  .brand-name {
    font-size: 20px;
    font-weight: 700;
    color: rgba(255,255,255,0.90);
    letter-spacing: 0.02em;
  }

  .slide-pill {
    background: rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
  }

  /* Main card */
  .card {
    background: #FFF8F3;
    border-radius: 32px;
    width: 872px;
    padding: 64px 76px 56px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 32px 100px rgba(0,0,0,0.20);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #D97757, #e8956e);
    border-radius: 32px 32px 0 0;
  }

  .card-tag {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tag-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #D97757;
    flex-shrink: 0;
  }

  .tag-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: #D97757;
  }

  h1 {
    font-size: 68px;
    font-weight: 900;
    line-height: 1.06;
    color: #1A1816;
    letter-spacing: -0.025em;
  }

  h1 .accent {
    color: #D97757;
    display: inline;
  }

  .body-text {
    font-size: 23px;
    color: #6b5244;
    line-height: 1.55;
    font-weight: 500;
    border-left: 3px solid #D97757;
    padding-left: 16px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 12px;
    border-top: 1.5px solid rgba(217,119,87,0.18);
    margin-top: 4px;
  }

  .cta-text {
    font-size: 17px;
    font-weight: 700;
    color: #D97757;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Bottom bar */
  .bottombar {
    position: absolute;
    bottom: 52px;
    left: 60px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .swipe-hint {
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.03em;
  }

  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }
  .dot.active {
    width: 24px;
    border-radius: 4px;
    background: rgba(255,255,255,0.9);
  }
</style>
</head>
<body>

  <!-- Background Claude asterisk -->
  <div class="bg-asterisk">
    <svg width="520" height="520" viewBox="0 0 100 100" fill="none">
      <g fill="white">
        <rect x="46" y="5" width="8" height="90" rx="4"/>
        <rect x="46" y="5" width="8" height="90" rx="4" transform="rotate(45 50 50)"/>
        <rect x="46" y="5" width="8" height="90" rx="4" transform="rotate(90 50 50)"/>
        <rect x="46" y="5" width="8" height="90" rx="4" transform="rotate(135 50 50)"/>
      </g>
    </svg>
  </div>

  <!-- Sparkles -->
  <div class="spark spark-1">✦</div>
  <div class="spark spark-2">✦</div>
  <div class="spark spark-3">✦</div>
  <div class="spark spark-4">✦</div>
  <div class="spark spark-5">✦</div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="rgba(255,255,255,0.22)"/>
        <g fill="white" transform="translate(18,18)">
          <rect x="-2.5" y="-13" width="5" height="26" rx="2.5"/>
          <rect x="-2.5" y="-13" width="5" height="26" rx="2.5" transform="rotate(45)"/>
          <rect x="-2.5" y="-13" width="5" height="26" rx="2.5" transform="rotate(90)"/>
          <rect x="-2.5" y="-13" width="5" height="26" rx="2.5" transform="rotate(135)"/>
        </g>
      </svg>
      <span class="brand-name">@claudeprofessor</span>
    </div>
    <div class="slide-pill">01 · {{TOTAL_SLIDES}}</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-tag">
      <div class="tag-dot"></div>
      <span class="tag-text">✦ {{TAG}}</span>
    </div>

    <h1>{{TITLE}}</h1>

    <div class="body-text">
      {{SUBTITLE}}
    </div>

    <div class="card-footer">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <g fill="#D97757" transform="translate(11,11)">
          <rect x="-1.6" y="-8.5" width="3.2" height="17" rx="1.6"/>
          <rect x="-1.6" y="-8.5" width="3.2" height="17" rx="1.6" transform="rotate(45)"/>
          <rect x="-1.6" y="-8.5" width="3.2" height="17" rx="1.6" transform="rotate(90)"/>
          <rect x="-1.6" y="-8.5" width="3.2" height="17" rx="1.6" transform="rotate(135)"/>
        </g>
      </svg>
      <span class="cta-text">Desliza para aprender →</span>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <span class="swipe-hint">Claude AI · Tips diarios</span>
    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

</body>
</html>
