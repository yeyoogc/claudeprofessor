name: Publish Carousel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'   # 09:00 Spain (UTC+2 verano)
    - cron: '0 18 * * *'  # 20:00 Spain (UTC+2 verano)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Generate and publish carousel
        run: python run.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Update gallery
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add docs/posts.json
          git commit -m "Gallery: add post $(date +%Y-%m-%d-%H%M)" || echo "Nothing to commit"
          git push origin master
